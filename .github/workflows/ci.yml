name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: CLI smoke
        run: python -m prime_memory_folding encode architecture --tags '["technical","standalone"]'
      - name: MCP smoke
        run: printf '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}\n' | python -m prime_memory_folding.mcp_server
